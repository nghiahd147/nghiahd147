name: Generate Snake Animation

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate snake SVGs
        id: snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: nghiahd147
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark
            dist/github-contribution-grid-snake.svg?color_snake=#F700FF&color_dots=#0D0221,#1E0440,#4A148C,#9C27B0,#F700FF

      - name: List generated files (debug)
        run: ls -la dist/

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
          keep_history: false
          commit_message: "chore: regenerate snake svg"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
